<!-- Define document type and page language (default English) -->
<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Set character encoding to avoid character display issues -->
    <meta charset='utf-8'>

    <!-- Enable compatibility with older Internet Explorer browsers -->
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>

    <!-- Page title with translation support via data-lang -->
    <title data-lang="page-title">الرئيسية</title>

    <!-- Set viewport for responsive design on various devices -->
    <meta name='viewport' content='width=device-width, initial-scale=1'>

    <!-- Include core site stylesheets -->
    <link rel="stylesheet" href="../CSS/GlobalRulesStyle.css">
    <link rel="stylesheet" href="../CSS/darkMode.css">
    <!-- Dark mode styles -->
    <link rel="stylesheet" href="../CSS/loginStyle.css">
    <!-- Login/registration form styles -->

    <!-- Normalize styles across browsers -->
    <link rel='stylesheet' type='text/css' media='screen' href='../CSS/normalize.css'>

    <!-- Include Font Awesome icon library -->
    <link rel="stylesheet" href="../CSS/all.min.css">

    <!-- Load Google Work Sans font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Password reset form -->
    <main class="login-container">
        <div class="login-card">
            <!-- Form title -->
            <h2 data-lang="reset-title">إعادة تعيين كلمة المرور</h2>

            <!-- Input form -->
            <form id="resetForm">

                <!-- Email input field -->
                <div class="input-group">
                    <label for="email" data-lang="form-email">البريد الإلكتروني</label>
                    <input type="email" id="email" placeholder="example@mail.com" data-lang-placeholder="form-email" required>
                </div>

                <!-- New password input field -->
                <div class="input-group">
                    <label for="newPassword" data-lang="form-new-password">كلمة المرور الجديدة</label>
                    <div class="password-wrapper">
                        <input type="password" id="newPassword" data-lang-placeholder="form-new-password" required>
                    </div>
                </div>

                <!-- Submit button -->
                <button type="submit" class="btn login-btn" data-lang="reset-button">تحديث</button>

                <!-- Additional links -->
                <div class="form-links">
                    <a href="login.html" data-lang="back-login">Back to Login</a>
                </div>

                <!-- Back to home button -->
                <a href="index.html" class="btn back-btn" data-lang="back-home">Back to Home</a>
            </form>
        </div>
    </main>

    <!-- Load JavaScript files -->
    <script src="../JS/navbar.js"></script>
    <!-- Responsive sidebar menu -->
    <script src="../JS/language.js"></script>
    <!-- Multi-language support -->
    <script src="../JS/darkMode.js"></script>
    <!-- Dark mode activation -->
    <script src="../JS/reset.js"></script>
    <!-- Password reset logic -->

</body>

</html>
